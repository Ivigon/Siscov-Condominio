<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siscov - Login Restrito</title>
    <style>
        body { font-family: Arial; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #4169E1; width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #333; color: white; border: none; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #4169E1; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .msg { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 Acesso Restrito</h2>
        <p class="msg">Apenas Síndico ou Porteiro</p>
        <form onsubmit="event.preventDefault(); window.location.href='index.html'">
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit">Entrar no Sistema</button>
        </form>
    </div>
</body>
</html>
